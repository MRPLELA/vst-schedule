firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let items = [], nid = 1, CY, CM, selDate=null;

function loadData(){
  db.ref('sched_vst269').on('value', (snapshot) => {
    const data = snapshot.val();
    if(data){
      items = Object.keys(data).map(key => ({
        dbKey: key,
        ...data[key]
      }));
    } else {
      items = JSON.parse(JSON.stringify(INIT));
      items.forEach(item => {
        db.ref('sched_vst269').push(item);
      });
    }
    nid = items.length ? Math.max(...items.map(x => x.id || 0)) + 1 : 1;
    
    renderCal();
    if(document.getElementById('scr-list').classList.contains('on')) renderList();
    if(document.getElementById('scr-add').classList.contains('on')) renderManage();
  });
}

function ds(y,m,d){return y+'-'+(m<10?'0'+m:m)+'-'+(d<10?'0'+d:d)}
function evtsFor(dateStr){return items.filter(x=>(x.dates||[]).includes(dateStr)).sort((a,b)=>a.start.localeCompare(b.start))}
function clsDates(){const s=new Set();items.filter(x=>x.type==='class').forEach(x=>(x.dates||[]).forEach(d=>s.add(d)));return s}
function vrnDates(){const s=new Set();items.filter(x=>x.type==='vern').forEach(x=>(x.dates||[]).forEach(d=>s.add(d)));return s}
function actDates(){const s=new Set();items.filter(x=>x.type==='activity').forEach(x=>(x.dates||[]).forEach(d=>s.add(d)));return s}
function exmDates(){const s=new Set();items.filter(x=>x.type==='exam').forEach(x=>(x.dates||[]).forEach(d=>s.add(d)));return s}
function colDates(){const s=new Set();items.filter(x=>x.type==='college').forEach(x=>(x.dates||[]).forEach(d=>s.add(d)));return s}

function renderCal(){
  document.getElementById('mo-lbl').textContent=TM[CM]+' '+(CY+543);
  const g=document.getElementById('cal-grid');
  g.innerHTML='';
  const first=new Date(CY,CM,1).getDay();
  const dmax=new Date(CY,CM+1,0).getDate();
  const prev=new Date(CY,CM,0).getDate();
  const n=new Date();
  const tod=ds(n.getFullYear(),n.getMonth()+1,n.getDate());
  const CS=clsDates(), VS=vrnDates(), AS=actDates(), ES=exmDates(), COS=colDates();

  function cell(d,dateStr,extra){
    const el=document.createElement('div');
    el.className='day '+extra;
    const hc=CS.has(dateStr), hv=VS.has(dateStr), ha=AS.has(dateStr), he=ES.has(dateStr), hco=COS.has(dateStr);
    el.innerHTML=`<span class="dn">${d}</span><div class="dot-row">${hc?'<div class="dot cls"></div>':''}${hv?'<div class="dot vrn"></div>':''}${ha?'<div class="dot act"></div>':''}${he?'<div class="dot exm"></div>':''}${hco?'<div class="dot col"></div>':''}</div>`;
    return el;
  }

  for(let i=0;i<first;i++){
    const d=prev-first+1+i;
    const m=CM===0?12:CM, y=CM===0?CY-1:CY;
    g.appendChild(cell(d,ds(y,m,d),'other'));
  }
  for(let d=1;d<=dmax;d++){
    const dateStr=ds(CY,CM+1,d);
    let cls=(dateStr===tod?'today ':'')+( dateStr===selDate?'sel ':'');
    const el=cell(d,dateStr,cls.trim());
    el.addEventListener('click',()=>pickDay(dateStr));
    g.appendChild(el);
  }
  const rem=42-(first+dmax);
  for(let d=1;d<=rem;d++){
    const m=CM===11?1:CM+2, y=CM===11?CY+1:CY;
    g.appendChild(cell(d,ds(y,m,d),'other'));
  }
  if(selDate) renderPanel(selDate);
}

function pickDay(dateStr){selDate=dateStr;renderCal();renderPanel(dateStr);}

function eCard(ev) {
  const isV=ev.type==='vern';
  const isA=ev.type==='activity';
  const isE=ev.type==='exam';
  const isC=ev.type==='college';
  const barCls=isV?'vr':(isA?'ac':(isE?'ex':(isC?'co':(parseInt(ev.start)<12?'am':'pm'))));
  const isAdj=ev.note&&ev.note.includes('ปรับพื้นฐาน');
  return `<div class="ecard">
    <div class="ebar ${barCls}">
      <i class="ti ti-clock" style="font-size:13px" aria-hidden="true"></i>${ev.start} – ${ev.end} น.
      ${isV?`<span class="badge b-vr">📝 ${ev.note||'วันส่งงาน'}</span>`:''}
      ${isA?`<span class="badge b-ac">🎉 กิจกรรมแผนก</span>`:''}
      ${isE?`<span class="badge b-ex" style="background:var(--purple); color:#fff;">✏️ กำหนดวันสอบ</span>`:''}
      ${isC?`<span class="badge b-co" style="background:var(--pink); color:#fff;">🏛️ กิจกรรมวิทยาลัย</span>`:''}

function editItem(id) {
  const target = items.find(x => String(x.id) === String(id));
  if(!target) return;

  document.getElementById('form-title').innerHTML = `<i class="ti ti-edit" style="color:var(--blue-mid)"></i> กำลังแก้ไขข้อมูล: ${target.name}`;
  document.getElementById('btn-submit').textContent = "อัปเดตแก้ไขข้อมูล";
  document.getElementById('btn-submit').style.background = "var(--blue-mid)";
  document.getElementById('btn-cancel').style.display = "block";
  document.getElementById('edit-dbkey').value = target.dbKey || '';

  const ftype = document.getElementById('ftype');
  ftype.value = target.type;
  handleTypeChange(target.type);

  if(target.type === 'college') {
    document.getElementById('f-act').value = target.name || '';
  } else {
    document.getElementById('ft').value = target.teacher || '';
    autoFillTeacher(target.teacher);
    document.getElementById('fp').value = target.phone || '';
    
    if (target.teacher) {
      document.getElementById('fn').value = target.name || '';
      fillSubjDetails();
      document.getElementById('f-act').value = target.note || '';
    } else {
      document.getElementById('f-act').value = target.name || '';
    }
  }

  document.getElementById('fnote').value = target.remark || '';

  if(target.dates && target.dates.length > 0) {
    document.getElementById('fd').value = target.dates[0];
    if(target.dates.length > 1) {
      document.getElementById('fdm').value = target.dates.slice(1).join(', ');
    } else {
      document.getElementById('fdm').value = '';
    }
  }

  document.getElementById('fs').value = target.start;
  document.getElementById('fe').value = target.end;
  if(target.start === "00:00" && target.end === "23:59") {
    document.getElementById('f-all-day').checked = true;
    toggleAllDay(true);
  } else {
    document.getElementById('f-all-day').checked = false;
    toggleAllDay(false);
  }
  
  document.querySelector('.scroll-area').scrollTo({top: 0, behavior: 'smooth'});
  toast('ดึงข้อมูลขึ้นฟอร์มแก้ไขแล้ว');
}

function delItem(id, dbKey){
  if(!confirm('ลบรายการนี้ร่วมกันสำหรับทุกคนบนออนไลน์?')) return;
  if(dbKey) {
    db.ref('sched_vst269/' + dbKey).remove()
      .then(() => {
        resetFormState();
        toast('ลบรายการสำเร็จแล้ว');
      })
      .catch(e => toast('เกิดข้อผิดพลาดในการลบ'));
  } else {
    const target = items.find(x => String(x.id) === String(id));
    if(target && target.dbKey){
      db.ref('sched_vst269/' + target.dbKey).remove().then(() => { resetFormState(); toast('ลบแล้ว'); });
    } else {
      toast('ไม่พบคีย์ในฐานข้อมูลออนไลน์');
    }
  }
}

    else if (val === 'activity') { actLabel.textContent = "ชื่อกิจกรรม / อื่นๆ (ระบุได้)"; fAct.placeholder = "เช่น กิจกรรมปฐมนิเทศ, กิจกรรมเข้าค่าย"; }

function getThaiTimestamp() {
  const now = new Date();
  const dateStr = now.getDate();
  const monthStr = TM[now.getMonth()];
  const yearStr = now.getFullYear() + 543;
  const timeStr = now.toTimeString().substring(0, 5);
  return `เพิ่มเมื่อ: ${dateStr} ${monthStr} ${yearStr} - ${timeStr} น.`;
}

function saveItem() {
  const type = document.getElementById('ftype').value;
  let name = '';
  let noteVal = '';

  if (type === 'college') {
    name = document.getElementById('f-act').value.trim();
  } else {
    const fnVal = document.getElementById('fn').value.trim();
    const actVal = document.getElementById('f-act').value.trim();
    
    if (fnVal) {
      name = fnVal;
      noteVal = actVal;
    } else {
      name = actVal;
      noteVal = '';
    }
  }
  
  if(!name){toast('กรุณากรอกชื่อวิชาหรือรายละเอียดกิจกรรม');return;}
  
  const dateVal=document.getElementById('fd').value;
  const dates=[];
  if(dateVal)dates.push(dateVal);
  
  const moreRaw=document.getElementById('fdm').value;
  if(moreRaw){
    moreRaw.split(',').forEach(s=>{
      const p=s.trim();
      if(/^\d{2}\/\d{2}\/\d{2}$/.test(p)){const[d,m,y]=p.split('/');dates.push(`20${y}-${m}-${d}`);}
      else if(/^\d{4}-\d{2}-\d{2}$/.test(p))dates.push(p);
    });
  }

  const editDbKey = document.getElementById('edit-dbkey').value;

  const itemData = {
    type: type,
    name: name,
    code: document.getElementById('fc-code').value.trim(),
    credit: document.getElementById('fcr').value.trim(),
    dates: dates,
    start: document.getElementById('fs').value,
    end: document.getElementById('fe').value,
    teacher: document.getElementById('ft').value.trim(),
    phone: document.getElementById('fp').value.trim(),
    note: noteVal,
    remark: document.getElementById('fnote').value.trim(),
    createdAt: getThaiTimestamp()
  };

  if(editDbKey) {
    db.ref('sched_vst269/' + editDbKey).update(itemData)
      .then(() => {
        resetFormState();
        toast('อัปเดตแก้ไขข้อมูลสำเร็จ');
      })
      .catch(e => toast('แก้ไขข้อมูลล้มเหลว'));
  } else {
    itemData.id = nid++;
    db.ref('sched_vst269').push(itemData)
      .then(() => {
        resetFormState();
        toast('บันทึกขึ้นระบบออนไลน์แล้ว');
      })
      .catch(e => toast('บันทึกล้มเหลว'));
  }
}

function resetFormState() {
  document.getElementById('form-title').innerHTML = `<i class="ti ti-plus-circle" aria-hidden="true"></i>เพิ่มรายวิชา / กำหนดส่งงาน / กิจกรรม / วันสอบ`;
  document.getElementById('btn-submit').textContent = "บันทึกข้อมูล";
  document.getElementById('btn-submit').style.background = "var(--green)";
  document.getElementById('btn-cancel').style.display = "none";
  document.getElementById('edit-dbkey').value = '';

  const fn = document.getElementById('fn');
  fn.innerHTML = '<option value="">เลือกผู้สอนเพื่อดึงชื่อวิชาอัตโนมัติ</option>';
  fn.disabled = true;
  fn.style.background = '#f0f0f0'; fn.style.color = '#666';

  ['f-act','fc-code','fcr','fdm','ft','fp','fnote'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fd').value='';
  document.getElementById('f-all-day').checked = false;

  const n=new Date();CY=n.getFullYear();CM=n.getMonth();
  selDate=ds(n.getFullYear(),n.getMonth()+1,n.getDate());

function show(id,btn,idx){
  document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.tab,.bnav-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById('scr-'+id).classList.add('on');
  document.querySelectorAll('.tab')[idx].classList.add('on');
  document.querySelectorAll('.bnav-btn')[idx].classList.add('on');
  if(id==='list')renderList();
  if(id==='add')renderManage();
}

  const t=document.getElementById('toast');

}

function autoFillTeacher(tName) {
  const fn = document.getElementById('fn');
  if (!tName || !TEACHER_DATA[tName]) {
    document.getElementById('fp').value = ''; 
    fn.innerHTML = '<option value="">เลือกผู้สอนเพื่อดึงชื่อวิชาอัตโนมัติ</option>';
    fn.disabled = true;
    fn.style.background = '#f0f0f0'; fn.style.color = '#666';
    document.getElementById('fc-code').value = ''; 
    document.getElementById('fcr').value = '';
    return;
  }
  const info = TEACHER_DATA[tName];
  document.getElementById('fp').value = info.phone;
  
  fn.innerHTML = '';
  info.subjects.forEach(subj => {
    const opt = document.createElement('option');
    opt.value = subj.name;
    opt.textContent = subj.name;
    opt.dataset.code = subj.code;
    opt.dataset.credit = subj.credit;
    fn.appendChild(opt);
  });
  
  fn.disabled = false;
  fn.style.background = 'var(--surf)'; 
  fn.style.color = 'var(--txt)';
  
  fillSubjDetails();
  document.getElementById('f-act').value = '';
}

function fillSubjDetails() {
  const fn = document.getElementById('fn');
  if(fn.selectedIndex >= 0 && fn.options[fn.selectedIndex].value !== "") {
    const opt = fn.options[fn.selectedIndex];
    document.getElementById('fc-code').value = opt.dataset.code || '';
    document.getElementById('fcr').value = opt.dataset.credit || '';
  }
}
